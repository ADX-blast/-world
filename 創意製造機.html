<!doctype html>
<html lang="zh-TW" class="h-full">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>✨ 創意製造機 ✨</title>
 <script src="https://cdn.tailwindcss.com/3.4.17"></script>
 <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
 <style>
   * { font-family: 'Zen Maru Gothic', sans-serif; }
   @keyframes sparkle { 0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); } 50% { opacity: 0.6; transform: scale(1.3) rotate(180deg); } }
   @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
   @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(236, 72, 153, 0.3); } 50% { box-shadow: 0 0 40px rgba(236, 72, 153, 0.6); } }
   .slot-window { background: linear-gradient(135deg, #fff5ff 0%, #ffe5f7 100%); border: 3px solid #ffb6d9; }
   .sparkle { animation: sparkle 2s ease-in-out infinite; }
   .float { animation: float 3s ease-in-out infinite; }
   .glow { animation: glow 2s ease-in-out infinite; }
   .fortune-card { background: linear-gradient(135deg, #fff5ff 0%, #ffe5f7 100%); border: 3px dashed #ffb6d9; border-radius: 20px; }
   .cat-btn { transition: all 0.2s; }
   .cat-btn.active { background: #ec4899 !important; color: white !important; border-color: #db2777 !important; }
 </style>
</head>
<body class="h-full overflow-auto bg-gradient-to-br from-pink-100 via-purple-100 to-rose-100">
 
 <div id="lightbox" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4" onclick="closeLightbox()">
     <img id="lightbox-img" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl" src="">
     <button class="absolute top-4 right-4 text-white text-4xl font-bold">&times;</button>
 </div>

 <div id="app" class="min-h-full w-full p-4 md:p-8 flex flex-col items-center">
  
   <h1 class="text-4xl md:text-6xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-rose-400 mb-8 float">✨ 創意製造機 ✨</h1>

   <div class="max-w-2xl w-full bg-gradient-to-b from-pink-300 via-purple-300 to-rose-300 rounded-3xl p-8 shadow-2xl border-4 border-pink-400 glow text-center">
    <div id="category-container" class="grid grid-cols-3 md:grid-cols-5 gap-2 mb-8"></div>

    <div class="flex justify-center gap-6 mb-8">
     <div class="slot-window w-32 h-32 md:w-40 md:h-40 rounded-3xl flex items-center justify-center border-4 border-pink-300">
      <div id="slot1" class="text-6xl md:text-7xl">🐱</div>
     </div>
     <div class="flex items-center text-4xl md:text-6xl font-bold text-pink-400">💗</div>
     <div class="slot-window w-32 h-32 md:w-40 md:h-40 rounded-3xl flex items-center justify-center border-4 border-pink-300">
      <div id="slot2" class="text-6xl md:text-7xl">🍎</div>
     </div>
    </div>
    <button id="spin-btn" onclick="spin()" class="w-full py-6 bg-gradient-to-r from-pink-400 to-rose-400 hover:scale-105 active:scale-95 text-white text-3xl font-bold rounded-3xl shadow-lg border-4 border-pink-500 transition-all"> 💖 抽出我的好運！ </button>
   </div>

   <div id="fortune-section" class="hidden mt-8 max-w-2xl w-full animate-in fade-in zoom-in duration-500">
    <div class="fortune-card p-6 shadow-2xl text-center">
     <h2 class="text-2xl font-bold text-pink-500 mb-6 italic">—— 你的幸運小卡✨ ——</h2>
     
     <div id="fortune-image-container" class="mb-6 bg-white/50 rounded-xl overflow-hidden shadow-inner border-2 border-pink-200 cursor-pointer hover:opacity-95 transition-all" onclick="openResultInLightbox()">
        </div>

     <div class="flex flex-wrap justify-center gap-4">
        <button onclick="downloadFortune()" class="px-8 py-3 bg-pink-500 text-white font-bold rounded-2xl shadow-lg hover:bg-pink-600 transition-all scale-100 hover:scale-105">📥 下載這份好運</button>
        <button onclick="toggleSubmitPanel()" class="px-8 py-3 bg-purple-500 text-white font-bold rounded-2xl shadow-lg hover:bg-purple-600 transition-all scale-100 hover:scale-105">📤 投稿到展示牆</button>
     </div>
    </div>
   </div>

   <div id="submit-panel" class="hidden mt-8 max-w-2xl w-full">
    <div class="fortune-card p-6 shadow-2xl bg-white/90">
     <h3 class="text-2xl font-bold text-center text-pink-500 mb-4">✨ 分享你的魔法時刻 ✨</h3>
     <div class="space-y-4">
        <div class="bg-pink-50 p-4 rounded-xl border border-pink-100 text-center">
            <label class="block text-sm font-bold text-pink-600 mb-2">📸 這是你剛抽到的小卡：</label>
            <div id="card-preview" class="h-40 bg-white rounded-lg flex items-center justify-center text-gray-400 border border-pink-200 overflow-hidden" onclick="openPreviewInLightbox('card-preview')"></div>
        </div>
        <div>
            <label class="block text-sm font-bold text-purple-600 mb-1">🖼️ 上傳一張生活照 (展示圖)</label>
            <input type="file" id="display-image-input" accept="image/*" onchange="handleImageUpload(event, 'display-preview')" class="w-full text-sm">
            <div id="display-preview" class="mt-2 h-32 bg-gray-50 rounded flex items-center justify-center text-gray-400 border border-dashed border-purple-200 overflow-hidden cursor-pointer" onclick="openPreviewInLightbox('display-preview')">點此預覽展示圖</div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <input type="text" id="creator-name-input" placeholder="你的暱稱" class="w-full p-3 border border-pink-200 rounded-xl outline-pink-400">
            <input type="text" id="creator-url-input" placeholder="IG / Threads 網址" class="w-full p-3 border border-pink-200 rounded-xl outline-pink-400">
        </div>
        <button id="submit-btn" onclick="submitFortune()" class="w-full py-4 bg-gradient-to-r from-pink-400 to-rose-400 text-white text-xl font-bold rounded-2xl shadow-xl">✨ 發送投稿 ✨</button>
        <p id="submit-status" class="text-center font-bold"></p>
     </div>
    </div>
   </div>

   <div class="mt-20 max-w-6xl w-full">
    <h2 class="text-3xl md:text-4xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-rose-500 mb-12">💖 好運分享展示牆 💖</h2>
    <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
   </div>
 </div>

 <script>
   const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwj-CrHFLjzz1v-QNwtCrr5LwgoOV223ATZQdx3NrtJOcyY3xsAZuCiwiTNQho5Io39/exec';
   const characters = [{emoji:'🐱'},{emoji:'🐶'},{emoji:'🐰'},{emoji:'🐼'},{emoji:'🦊'},{emoji:'🦄'},{emoji:'🤖'},{emoji:'🧚'},{emoji:'🐲'},{emoji:'🧜'}];
   const items = [{emoji:'🍎'},{emoji:'🍓'},{emoji:'🍰'},{emoji:'🌈'},{emoji:'⭐'},{emoji:'🎀'},{emoji:'💎'},{emoji:'🌙'},{emoji:'🌻'},{emoji:'🍭'}];
   const categories = ['戀愛運', '事業運', '財運', '學業運', '健康運', '人際運', '旅行運', '投資運', '購物運', '創意運', '心情運', '轉職運', '家庭運', '友情運', '幸運日'];
   
   const fortunes = [
     {name:'宇宙大吉', detail:'運勢如虹！今天做任何決定都是正確的，大膽前進，整個宇宙都會幫你！'},
     {name:'超級幸運', detail:'會有驚喜發生，請隨時準備好迎接好運氣，今天你是主角！'},
     {name:'桃花朵朵', detail:'你的魅力指數爆表，適合主動與人互動，轉角可能遇到驚喜。'},
     {name:'財運亨通', detail:'會有小額的偏財運出現，或是撿到便宜的好東西，錢包鼓鼓的！'},
     {name:'心情綻放', detail:'壓力煙消雲散，今天適合安排一場放鬆的小旅行或給自己一個甜點。'},
     {name:'靈感爆發', detail:'腦袋裡全是好點子，這絕對是完成創意專案或規劃未來的絕佳時機！'},
     {name:'貴人相助', detail:'遇到困難別擔心，轉角就會遇到幫你一把的好心人，善緣正在流動。'},
     {name:'平穩順心', detail:'雖然沒有大風大浪，但這種簡單的平安最珍貴，好好享受當下的寧靜。'},
     {name:'夢想成真', detail:'堅持下去，那個你心心念念已久的目標，現在正準備給你最溫暖的回應！'},
     {name:'活力滿滿', detail:'今天的你精力充沛，散發的正能量連路邊的小貓都想對你撒嬌喔！'}
   ];

   let currentChar = '🐱', currentItem = '🍎', isSpinning = false;
   let currentSelectedCategory = '戀愛運';
   let currentGeneratedImageUrl = '';

   // 初始化類別
   const container = document.getElementById('category-container');
   categories.forEach(cat => {
       const btn = document.createElement('button');
       btn.textContent = cat;
       btn.className = `cat-btn px-2 py-2 text-xs md:text-sm font-bold bg-white/80 border-2 border-pink-200 text-pink-600 rounded-xl hover:bg-pink-100`;
       if (cat === currentSelectedCategory) btn.classList.add('active');
       btn.onclick = () => {
           if(isSpinning) return;
           document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
           btn.classList.add('active');
           currentSelectedCategory = cat;
       };
       container.appendChild(btn);
   });

   function spin() {
     if (isSpinning) return;
     isSpinning = true;
     const btn = document.getElementById('spin-btn'); btn.disabled = true;
     document.getElementById('fortune-section').classList.add('hidden');
     
     let count = 0;
     const timer = setInterval(() => {
       document.getElementById('slot1').textContent = characters[Math.floor(Math.random()*characters.length)].emoji;
       document.getElementById('slot2').textContent = items[Math.floor(Math.random()*items.length)].emoji;
       if(++count > 15) {
           clearInterval(timer);
           currentChar = characters[Math.floor(Math.random()*characters.length)].emoji;
           currentItem = items[Math.floor(Math.random()*items.length)].emoji;
           document.getElementById('slot1').textContent = currentChar;
           document.getElementById('slot2').textContent = currentItem;
           
           const f = fortunes[Math.floor(Math.random()*fortunes.length)];
           
           // 生成完整圖片
           generateFortuneImage(f.name, f.detail);

           document.getElementById('fortune-section').classList.remove('hidden');
           document.getElementById('fortune-section').scrollIntoView({ behavior: 'smooth' });
           isSpinning = false; btn.disabled = false;
       }
     }, 80);
   }

   // 核心繪圖邏輯：結合 Emoji + 標題 + 詳細文字
   function generateFortuneImage(title, detail) {
     const canvas = document.createElement('canvas');
     const ctx = canvas.getContext('2d');
     
     // 比例設定為 5:6 較適合手機分享
     canvas.width = 600; canvas.height = 750;
     
     // 1. 背景漸層
     const grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
     grd.addColorStop(0, '#fff5ff'); grd.addColorStop(1, '#ffd9f0');
     ctx.fillStyle = grd; ctx.fillRect(0, 0, canvas.width, canvas.height);
     
     // 2. 裝飾邊框
     ctx.strokeStyle = '#ffb6d9'; ctx.lineWidth = 20; ctx.strokeRect(30, 30, canvas.width - 60, canvas.height - 60);
     ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4; ctx.strokeRect(45, 45, canvas.width - 90, canvas.height - 90);
     
     // 3. 繪製 Emoji 組
     ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
     ctx.font = '100px serif'; ctx.fillText(currentChar, canvas.width * 0.3, 160);
     ctx.font = '50px serif'; ctx.fillText('💗', canvas.width * 0.5, 160);
     ctx.font = '100px serif'; ctx.fillText(currentItem, canvas.width * 0.7, 160);
     
     // 4. 繪製類別標籤 (粉色小底色)
     const categoryText = `【 ${currentSelectedCategory} 】`;
     ctx.font = 'bold 28px "Zen Maru Gothic", sans-serif';
     ctx.fillStyle = '#be185d';
     ctx.fillText(categoryText, canvas.width / 2, 280);
     
     // 5. 繪製主運勢標題 (大字)
     ctx.fillStyle = '#ec4899'; 
     ctx.font = 'bold 70px "Zen Maru Gothic", sans-serif'; 
     ctx.fillText(title, canvas.width / 2, 360);

     // 6. 繪製詳細說明文字區 (自動換行)
     ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
     ctx.roundRect = function(x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.beginPath();
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
        return this;
     };
     ctx.roundRect(80, 440, 440, 200, 20).fill();

     ctx.fillStyle = '#6d28d9'; // 深紫色文字
     ctx.font = '500 28px "Zen Maru Gothic", sans-serif';
     wrapText(ctx, detail, canvas.width / 2, 500, 380, 42);
     
     // 7. 繪製底部裝飾與日期
     ctx.textAlign = 'center'; ctx.fillStyle = '#db2777'; ctx.font = '18px sans-serif'; 
     ctx.fillText(`✨ 創意製造機生成於 ${new Date().toLocaleDateString()} ✨`, canvas.width / 2, 690);
     
     // 產出
     currentGeneratedImageUrl = canvas.toDataURL('image/png');
     document.getElementById('fortune-image-container').innerHTML = `<img src="${currentGeneratedImageUrl}" class="w-full">`;
     const preview = document.getElementById('card-preview');
     preview.innerHTML = `<img src="${currentGeneratedImageUrl}" class="h-full w-full object-cover">`;
     preview.dataset.image = currentGeneratedImageUrl;
   }

   // Canvas 文字自動換行工具
   function wrapText(context, text, x, y, maxWidth, lineHeight) {
      const words = text.split('');
      let line = '';
      for (let n = 0; n < words.length; n++) {
          let testLine = line + words[n];
          let metrics = context.measureText(testLine);
          if (metrics.width > maxWidth && n > 0) {
              context.fillText(line, x, y);
              line = words[n];
              y += lineHeight;
          } else {
              line = testLine;
          }
      }
      context.fillText(line, x, y);
   }

   function downloadFortune() {
     const link = document.createElement('a');
     link.download = `fortune-${Date.now()}.png`;
     link.href = currentGeneratedImageUrl;
     link.click();
   }

   function openResultInLightbox() { openLightbox(currentGeneratedImageUrl); }
   function openLightbox(imgSrc) {
       if(!imgSrc) return;
       const modal = document.getElementById('lightbox');
       const modalImg = document.getElementById('lightbox-img');
       modalImg.src = imgSrc;
       modal.classList.remove('hidden');
   }
   function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }
   function openPreviewInLightbox(id) {
       const preview = document.getElementById(id);
       const img = preview.querySelector('img');
       if(img) openLightbox(img.src);
   }

   function handleImageUpload(event, previewId) {
     const file = event.target.files[0];
     if (!file) return;
     const reader = new FileReader();
     reader.onload = (e) => {
       const preview = document.getElementById(previewId);
       preview.innerHTML = `<img src="${e.target.result}" class="h-full w-full object-cover">`;
       preview.dataset.image = e.target.result;
     };
     reader.readAsDataURL(file);
   }

   async function fetchGallery() {
       const galleryGrid = document.getElementById('gallery-grid');
       galleryGrid.innerHTML = `<div class="col-span-full text-center p-8 text-pink-500 font-bold animate-pulse">✨ 蒐集大家的幸運中...</div>`;
       try {
           const res = await fetch(SCRIPT_URL);
           const data = await res.json();
           if (!data || data.length === 0) {
               galleryGrid.innerHTML = `<div class="col-span-full text-center p-8 text-gray-400">尚無投稿，來當第一個吧！</div>`;
               return;
           }
           galleryGrid.innerHTML = data.reverse().map(sub => `
               <div class="fortune-card p-4 shadow-lg bg-white/80 rounded-2xl relative group hover:-translate-y-2 transition-all duration-300">
                   <div class="relative w-full h-64 bg-gray-100 rounded-lg mb-4 overflow-hidden cursor-pointer" onclick="openLightbox('${sub.display_image || ''}')">
                       <img src="${sub.display_image || ''}" class="w-full h-full object-cover">
                   </div>
                   <div class="flex justify-center -mt-24 relative z-10">
                       <div class="relative w-44 h-56 bg-white border-4 border-white rounded-xl shadow-2xl overflow-hidden cursor-pointer hover:scale-105 transition-all" onclick="openLightbox('${sub.card_image || ''}')">
                           <img src="${sub.card_image || ''}" class="w-full h-full object-cover">
                       </div>
                   </div>
                   <div class="text-center mt-4">
                       <p class="font-bold text-pink-600 text-lg">${sub.creator_name || '幸運兒'}</p>
                       <a href="${sub.creator_url || '#'}" target="_blank" class="text-xs text-purple-400 underline hover:text-purple-600">${sub.creator_url ? '✨ 追蹤作者' : '來自宇宙的祝福'}</a>
                   </div>
               </div>
           `).join('');
       } catch (e) {
           galleryGrid.innerHTML = `<div class="col-span-full text-center p-8 text-red-400 font-bold">❌ 展示牆載入出錯</div>`;
       }
   }

   async function submitFortune() {
     const cardImg = document.getElementById('card-preview').dataset.image;
     const displayImg = document.getElementById('display-preview').dataset.image;
     const name = document.getElementById('creator-name-input').value.trim();
     const url = document.getElementById('creator-url-input').value.trim();
     const status = document.getElementById('submit-status');

     if (!cardImg || !displayImg || !name) { 
        status.textContent = '❌ 請填寫暱稱並上傳照片喔！'; status.style.color = 'red';
        return; 
     }

     status.textContent = '⏳ 投稿中...'; status.style.color = '#db2777';
     
     try {
       await fetch(SCRIPT_URL, { 
         method: 'POST', 
         mode: 'no-cors', 
         body: JSON.stringify({ 
           id: Date.now().toString(), 
           card_image: cardImg, 
           display_image: displayImg, 
           creator_name: name, 
           creator_url: url, 
           created_at: new Date().toLocaleString() 
         }) 
       });
       status.textContent = '✨ 投稿成功！'; status.style.color = 'green';
       setTimeout(() => location.reload(), 2000);
     } catch (e) { 
       status.textContent = '❌ 提交失敗'; 
     }
   }

   function toggleSubmitPanel() { 
    const panel = document.getElementById('submit-panel');
    panel.classList.toggle('hidden');
    if(!panel.classList.contains('hidden')) panel.scrollIntoView({ behavior: 'smooth' });
   }

   window.onload = fetchGallery;
 </script>
</body>
</html>
